name: HideMyData

options:
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.4"

packages:
  OpenMedKit:
    url: https://github.com/maziyarpanahi/openmed.git
    from: 1.2.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0

settings:
  base:
    CLANG_ANALYZER_NONNULL: YES
    CLANG_ANALYZER_NUMBER_OBJECT_CONVERSION: YES_AGGRESSIVE
    CLANG_CXX_LANGUAGE_STANDARD: gnu++20
    CLANG_ENABLE_MODULES: YES
    CLANG_ENABLE_OBJC_ARC: YES
    CLANG_ENABLE_OBJC_WEAK: YES
    CLANG_WARN_BLOCK_CAPTURE_AUTORELEASING: YES
    CLANG_WARN_BOOL_CONVERSION: YES
    CLANG_WARN_COMMA: YES
    CLANG_WARN_CONSTANT_CONVERSION: YES
    CLANG_WARN_DEPRECATED_OBJC_IMPLEMENTATIONS: YES
    CLANG_WARN_DIRECT_OBJC_ISA_USAGE: YES_ERROR
    CLANG_WARN_DOCUMENTATION_COMMENTS: YES
    CLANG_WARN_EMPTY_BODY: YES
    CLANG_WARN_ENUM_CONVERSION: YES
    CLANG_WARN_INFINITE_RECURSION: YES
    CLANG_WARN_INT_CONVERSION: YES
    CLANG_WARN_NON_LITERAL_NULL_CONVERSION: YES
    CLANG_WARN_OBJC_IMPLICIT_RETAIN_SELF: YES
    CLANG_WARN_OBJC_LITERAL_CONVERSION: YES
    CLANG_WARN_OBJC_ROOT_CLASS: YES_ERROR
    CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: YES
    CLANG_WARN_RANGE_LOOP_ANALYSIS: YES
    CLANG_WARN_STRICT_PROTOTYPES: YES
    CLANG_WARN_SUSPICIOUS_MOVE: YES
    CLANG_WARN_UNGUARDED_AVAILABILITY: YES_AGGRESSIVE
    CLANG_WARN_UNREACHABLE_CODE: YES
    CLANG_WARN__DUPLICATE_METHOD_MATCH: YES
    ENABLE_STRICT_OBJC_MSGSEND: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GCC_C_LANGUAGE_STANDARD: gnu17
    GCC_NO_COMMON_BLOCKS: YES
    GCC_WARN_64_TO_32_BIT_CONVERSION: YES
    GCC_WARN_ABOUT_RETURN_TYPE: YES_ERROR
    GCC_WARN_UNDECLARED_SELECTOR: YES
    GCC_WARN_UNINITIALIZED_AUTOS: YES_AGGRESSIVE
    GCC_WARN_UNUSED_FUNCTION: YES
    GCC_WARN_UNUSED_VARIABLE: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    MTL_FAST_MATH: YES
  configs:
    Debug:
      COPY_PHASE_STRIP: NO
      DEBUG_INFORMATION_FORMAT: dwarf
      ENABLE_TESTABILITY: YES
      GCC_DYNAMIC_NO_PIC: NO
      GCC_OPTIMIZATION_LEVEL: 0
      GCC_PREPROCESSOR_DEFINITIONS:
        - DEBUG=1
        - $(inherited)
      MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
      ONLY_ACTIVE_ARCH: YES
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG $(inherited)
      SWIFT_OPTIMIZATION_LEVEL: -Onone
    Release:
      COPY_PHASE_STRIP: NO
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      ENABLE_NS_ASSERTIONS: NO
      MTL_ENABLE_DEBUG_INFO: NO
      SWIFT_COMPILATION_MODE: wholemodule

targets:
  HideMyData:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: HideMyData
        excludes:
          - .DS_Store
    dependencies:
      - package: OpenMedKit
        product: OpenMedKit
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        AUTOMATION_APPLE_EVENTS: NO
        CODE_SIGN_ENTITLEMENTS: HideMyData/HideMyData.entitlements
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: "0.2.0"
        ENABLE_APP_SANDBOX: YES
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_INCOMING_NETWORK_CONNECTIONS: NO
        ENABLE_OUTGOING_NETWORK_CONNECTIONS: YES
        ENABLE_PREVIEWS: YES
        ENABLE_RESOURCE_ACCESS_AUDIO_INPUT: NO
        ENABLE_RESOURCE_ACCESS_BLUETOOTH: NO
        ENABLE_RESOURCE_ACCESS_CALENDARS: NO
        ENABLE_RESOURCE_ACCESS_CAMERA: NO
        ENABLE_RESOURCE_ACCESS_CONTACTS: NO
        ENABLE_RESOURCE_ACCESS_LOCATION: NO
        ENABLE_RESOURCE_ACCESS_PHOTO_LIBRARY: NO
        ENABLE_RESOURCE_ACCESS_PRINTING: NO
        ENABLE_RESOURCE_ACCESS_USB: NO
        ENABLE_USER_SELECTED_FILES: readwrite
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: HideMyData
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_NSHumanReadableCopyright: © 2026 Maciej Bula
        LD_RUNPATH_SEARCH_PATHS: $(inherited) @executable_path/../Frameworks
        MARKETING_VERSION: "0.2.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.maciejbula.hidemydata
        PRODUCT_NAME: $(TARGET_NAME)
        REGISTER_APP_GROUPS: YES
        RUNTIME_EXCEPTION_ALLOW_DYLD_ENVIRONMENT_VARIABLES: NO
        RUNTIME_EXCEPTION_ALLOW_JIT: NO
        RUNTIME_EXCEPTION_ALLOW_UNSIGNED_EXECUTABLE_MEMORY: NO
        RUNTIME_EXCEPTION_DEBUGGING_TOOL: NO
        RUNTIME_EXCEPTION_DISABLE_EXECUTABLE_PAGE_PROTECTION: NO
        RUNTIME_EXCEPTION_DISABLE_LIBRARY_VALIDATION: NO
        SDKROOT: auto
        STRING_CATALOG_GENERATE_SYMBOLS: YES
        SUPPORTED_PLATFORMS: macosx
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_UPCOMING_FEATURE_MEMBER_IMPORT_VISIBILITY: YES
        SWIFT_VERSION: "6.0"
      configs:
        Release:
          CODE_SIGN_IDENTITY[sdk=macosx*]: Apple Development
          DEVELOPMENT_TEAM: 834CMTRWP6

schemes:
  HideMyData:
    build:
      targets:
        HideMyData: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: false
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
      revealArchiveInOrganizer: true

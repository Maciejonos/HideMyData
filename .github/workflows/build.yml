name: Checks

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - run: brew install swiftlint xcodegen

      - name: Verify generated Xcode project
        run: |
          xcodegen generate
          git diff --exit-code -- HideMyData.xcodeproj

      - name: Lint
        run: swiftlint --strict
